version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: hospital-db
    environment:
      - POSTDRES_USER=root
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=hospital_db
    ports:
      - "5432:5432" 
    volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - hospital-net

  #caching layer
  redis:
    image: redis:7-alpine
    container_name: hospital-cache
    ports:
      - "6379:6379"
    networks:
      - hospital-net

  # WSO2 API manager 
  api-manager:
    image: wso2/wso2am:4.3.0
    container_name: wso2-apim
    ports:
      - "8280:8280"
      - "8243:8243"
      - "9443:9443"
    networks:
      - hospital-net
    depends_on:
      - postgres

  # WSO2 MI
  micro-integrator:
    image: wso2/wso2mi:4.3.0
    container_name: wso2-mi
    ports:
      - "8290:8290"
      - "8253:8253"
    networks:
      - hospital-net
      
networks:
  hospital-net:
    driver: bridge

volumes:
  postgres_data: